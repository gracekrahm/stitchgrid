<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Knit Grid Editor</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #controls {
      margin: 10px;
    }

    #container {
      display: flex;
      align-items: flex-start;
    }

    #row-labels {
      display: flex;
      flex-direction: column;
      margin-right: 5px;
    }

    #col-labels {
      display: flex;
      justify-content: center;
      margin-bottom: 5px;
    }

    .label {
      width: 20px;
      height: 20px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    svg {
      border: 1px solid #ccc;
      background: #fafafa;
    }

    .stitch-group {
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="controls">
  Color: <input type="color" id="colorPicker" value="#ff0000">
</div>

<div id="col-labels"></div>

<div id="container">
  <div id="row-labels"></div>
  <svg id="chart" width="600" height="600"></svg>
</div>

<script>
const rows = 20;
const cols = 20;
const svg = document.getElementById("chart");
const colorPicker = document.getElementById("colorPicker");

let currentColor = colorPicker.value;

colorPicker.addEventListener("input", e => {
  currentColor = e.target.value;
});

// --- stitch sizing ---
const stitchSize = 25;

function createStitch(r, c) {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "stitch-group");
  g.dataset.row = r;
  g.dataset.col = c;

  const w = stitchSize;
  const h = stitchSize;

  g.setAttribute("transform", `translate(${c * w}, ${r * h}) scale(${w / 600})`);

  const left = document.createElementNS("http://www.w3.org/2000/svg", "path");
  const right = document.createElementNS("http://www.w3.org/2000/svg", "path");

  left.setAttribute("d", LEFT_PATH);
  right.setAttribute("d", RIGHT_PATH);

  left.setAttribute("fill", "#cccccc");
  right.setAttribute("fill", "#cccccc");

  left.setAttribute("opacity", "1");
  right.setAttribute("opacity", "1");

  g.appendChild(left);
  g.appendChild(right);

  return g;
}

function renderGrid() {
  svg.innerHTML = "";

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      svg.appendChild(createStitch(r, c));
    }
  }
}

// labels
function createLabels() {
  const rowLabels = document.getElementById("row-labels");
  const colLabels = document.getElementById("col-labels");

  for (let c = 0; c < cols; c++) {
    const d = document.createElement("div");
    d.className = "label";
    d.textContent = c + 1;
    colLabels.appendChild(d);
  }

  for (let r = 0; r < rows; r++) {
    const d = document.createElement("div");
    d.className = "label";
    d.textContent = r + 1;
    rowLabels.appendChild(d);
  }
}

// click handling
svg.addEventListener("click", (e) => {
  const stitch = e.target.closest("g.stitch-group");
  if (!stitch) return;

  stitch.querySelectorAll("path").forEach(p => {
    p.setAttribute("fill", currentColor);
  });
});

// init
createLabels();
renderGrid();

</script>

</body>
</html>
