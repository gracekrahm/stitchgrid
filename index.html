<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Knit Stitch Grid (Locked Layout)</title>

<style>
  body {
    margin: 0;
    background: #f5f5f5;
    font-family: sans-serif;
  }

  #controls {
    position: fixed;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 10;
    width: 220px;
  }

  label {
    font-size: 12px;
    display: block;
    margin-top: 8px;
  }

  input {
    width: 100%;
  }

  svg {
    display: block;
    margin: auto;
    background: white;
  }
</style>
</head>

<body>

<div id="controls">
  <label>Gauge Scale: <span id="scaleVal"></span></label>
  <input type="range" id="scale" min="0.5" max="4" value="1" step="0.1">

  <label>Fill Color:</label>
  <input type="color" id="color" value="#ff0000">
</div>

<svg id="canvas" width="900" height="700" viewBox="0 0 900 700"></svg>

<script>
const svgNS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("canvas");

/* ===== LOCKED BASE PARAMETERS ===== */
const BASE_STITCH_SIZE = 97;
const BASE_ROW_SPACING = 0.79;
const BASE_INTERNAL_SCALE = 4;

/* ===== STITCH PATH ===== */
const stitchPathData = `
m 0,0
c 0.0161,-1.85405 0.0151,-3.71528 -0.0418,-5.56693
-0.21376,-1.60508 -0.82301,-3.15569 -1.71114,-4.50377
-0.83955,-1.20233 -1.8919,0.15882 -2.47536,0.86493
-0.75126,0.76503 -1.39814,1.63108 -2.0184,2.506
-1.09808,1.67485 -2.19951,3.34692 -3.40046,4.94991
-0.46098,0.96625 -1.19549,1.81042 -1.24952,2.91779
-0.33647,1.91326 -0.25331,3.86606 -0.51202,5.7905
-0.14293,2.12408 -0.18126,4.25548 0.007,6.37822
-0.084,1.46207 0.009,2.94939 0.57817,4.31714
0.52977,0.82075 1.22534,-1.23227 1.77945,-1.62912
1.41695,-1.79237 2.33146,-3.93561 3.87033,-5.63961
0.80261,-0.8534 1.56054,-1.79847 2.48679,-2.50545
C -1.70964,6.6598 -1.02979,5.2123 -0.78582,3.66371
-0.50364,2.44765 -0.16887,1.23842 0,0
Z
m -23.25957,0
c -0.0161,-1.85405 -0.0151,-3.71528 0.0417,-5.56693
0.21375,-1.60508 0.82301,-3.15569 1.71114,-4.50377
0.83955,-1.20233 1.8919,0.15882 2.47539,0.86493
0.75123,0.76503 1.39811,1.63108 2.01837,2.506
1.09807,1.67485 2.19951,3.34692 3.40045,4.94991
0.46098,0.96625 1.19549,1.81042 1.24952,2.91779
0.33647,1.91326 0.25331,3.86606 0.51202,5.7905
0.14291,2.12408 0.18124,4.25548 -0.007,6.37822
0.0839,1.46207 -0.009,2.94939 -0.57817,4.31714
-0.52975,0.82075 -1.22531,-1.23227 -1.77945,-1.62912
-1.41695,-1.79237 -2.33146,-3.93561 -3.87033,-5.63961
-0.80259,-0.8534 -1.56054,-1.79847 -2.48676,-2.50545
C -21.55001,6.6598 -22.22989,5.2123 -22.47383,3.66371
-22.75604,2.44765 -23.09081,1.23842 -23.25988,0
Z
`;

function renderGrid() {
  svg.innerHTML = "";

  const color = document.getElementById("color").value;
  const userScale = parseFloat(document.getElementById("scale").value);

  document.getElementById("scaleVal").textContent = userScale;

  const rows = 6;
  const cols = 10;

  const canvasWidth = 900;
  const canvasHeight = 700;

  const stitchSize = BASE_STITCH_SIZE;
  const rowSpacing = BASE_ROW_SPACING;

  const gridWidth = (cols - 1) * stitchSize;
  const gridHeight = (rows - 1) * stitchSize * rowSpacing;

  const offsetX = (canvasWidth - gridWidth) / 2;
  const offsetY = (canvasHeight - gridHeight) / 2;

  // Root group = behaves like grouped object (Inkscape-style)
  const rootGroup = document.createElementNS(svgNS, "g");

  rootGroup.setAttribute(
    "transform",
    `translate(${offsetX}, ${offsetY}) scale(${userScale})`
  );

  svg.appendChild(rootGroup);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {

      const group = document.createElementNS(svgNS, "g");

      const path = document.createElementNS(svgNS, "path");
      path.setAttribute("d", stitchPathData);

      // Stroke ALWAYS black
      path.setAttribute("stroke", "black");

      // Fill controlled by user
      path.setAttribute("fill", color);

      group.appendChild(path);

      // Locked spacing
      group.setAttribute(
        "transform",
        `translate(${c * stitchSize}, ${r * stitchSize * rowSpacing})`
      );

      rootGroup.appendChild(group);
    }
  }
}

/* Controls */
document.querySelectorAll("input").forEach(input => {
  input.addEventListener("input", renderGrid);
});

/* Initial render */
renderGrid();
</script>

</body>
</html>
