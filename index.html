<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knit Chart Editor</title>

<style>
  body {
    font-family: sans-serif;
    background: #f5f5f5;
    text-align: center;
  }

  h1 {
    margin-top: 20px;
  }

  #toolbar {
    margin: 15px;
  }

  .color-btn {
    width: 30px;
    height: 30px;
    border: 2px solid #333;
    margin: 3px;
    cursor: pointer;
    display: inline-block;
  }

  .selected {
    outline: 3px solid black;
  }

  #chart {
    background: white;
    border: 1px solid #ccc;
  }
</style>
</head>

<body>

<h1>Knit Chart Editor</h1>

<div id="toolbar"></div>

<svg id="chart" width="600" height="600"></svg>

<script>
const rows = 30
const cols = 30
const stitchSize = 18

const colors = ["#ffffff", "#d62828", "#1d3557", "#2a9d8f", "#f4a261"]
let currentColor = colors[1]

// grid data
let grid = Array.from({length: rows}, () => Array(cols).fill(colors[0]))

const svg = document.getElementById("chart")
const toolbar = document.getElementById("toolbar")

// ---------- COLOR PALETTE ----------
colors.forEach(color => {
  const btn = document.createElement("div")
  btn.className = "color-btn"
  btn.style.background = color

  if (color === currentColor) btn.classList.add("selected")

  btn.onclick = () => {
    currentColor = color
    document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("selected"))
    btn.classList.add("selected")
  }

  toolbar.appendChild(btn)
})

// ---------- SINGLE HALF PATH (FROM YOUR SVG) ----------
const HALF_PATH = `
M 595.09414,225.92349
c -2.01305,0.41789 -3.04853,-7.02074 -3.28613,-10.60044
c -0.2376,-3.5797 0.0797,-5.82459 -0.10601,-8.58635
c -0.18573,-2.76176 -0.22614,-3.98514 -0.42401,-7.73833
c -0.19787,-3.75319 0.28198,-10.07043 0.42401,-14.62861
c 0.14203,-4.55818 0.2101,-8.58576 0.42402,-12.72054
c 0.21392,-4.13478 -0.0386,-8.84129 0.84804,-12.08451
c 0.88663,-3.24322 2.16459,-4.62048 3.60415,-7.20831
c 1.43956,-2.58783 3.28726,-5.40531 5.08821,-8.26834
c 1.80095,-2.86303 3.90689,-6.33203 5.72424,-8.90437
c 1.81735,-2.57234 3.28081,-4.52026 5.08822,-6.57228
c 1.80741,-2.05202 3.56763,-3.90763 5.72424,-5.72423
c 2.15661,-1.8166 3.65918,-5.73214 7.2083,-5.08822
c 3.54912,0.64392 5.58533,6.845 7.2083,10.60045
c 1.62297,3.75545 2.0701,7.82719 2.54411,11.44847
c 0.47401,3.62128 0.50902,6.98924 0.42402,10.17643
c -0.085,3.18719 -0.36429,5.7526 -0.84804,8.90438
c -0.48375,3.15178 -1.18098,6.28262 -2.12009,9.96441
c -0.93911,3.68179 -1.7082,8.64212 -3.60415,12.08451
c -1.89595,3.44239 -4.07064,6.38035 -6.14826,9.11639
c -2.07762,2.73604 -4.1957,3.82157 -6.36027,7.20829
c -2.16457,3.38672 -4.97732,8.77098 -7.63232,12.29652
c -2.655,3.52554 -4.73087,6.42374 -7.20829,9.5404
c -2.47742,3.11666 -4.55924,6.36639 -6.57229,6.78428
Z
`

// ---------- STITCH FACTORY ----------
function createStitch(r, c) {
  const stitch = document.createElementNS("http://www.w3.org/2000/svg", "g")

  const scale = stitchSize / 120

  // left half
  const left = document.createElementNS("http://www.w3.org/2000/svg", "path")
  left.setAttribute("d", HALF_PATH)

  // mirrored right half
  const right = document.createElementNS("http://www.w3.org/2000/svg", "path")
  right.setAttribute("d", HALF_PATH)
  right.setAttribute("transform", "scale(-1,1) translate(-120,0)")

  left.setAttribute("fill", grid[r][c])
  right.setAttribute("fill", grid[r][c])

  left.setAttribute("stroke", "#999")
  right.setAttribute("stroke", "#999")

  left.setAttribute("stroke-width", "0.5")
  right.setAttribute("stroke-width", "0.5")

  const inner = document.createElementNS("http://www.w3.org/2000/svg", "g")
  inner.setAttribute("transform", `scale(${scale})`)

  inner.appendChild(left)
  inner.appendChild(right)

  stitch.appendChild(inner)

  stitch.setAttribute(
    "transform",
    `translate(${c * stitchSize}, ${r * stitchSize * 0.9})`
  )

  stitch.dataset.row = r
  stitch.dataset.col = c

  return stitch
}

// ---------- BUILD GRID ----------
for (let r = 0; r < rows; r++) {
  for (let c = 0; c < cols; c++) {
    svg.appendChild(createStitch(r, c))
  }
}

// ---------- PAINTING ----------
let isMouseDown = false

svg.addEventListener("mousedown", () => isMouseDown = true)
svg.addEventListener("mouseup", () => isMouseDown = false)
svg.addEventListener("mouseleave", () => isMouseDown = false)

function paint(target) {
  const stitch = target.closest("g")
  if (!stitch) return

  const r = stitch.dataset.row
  const c = stitch.dataset.col

  grid[r][c] = currentColor

  stitch.querySelectorAll("path").forEach(p => {
    p.setAttribute("fill", currentColor)
  })
}

svg.addEventListener("click", (e) => {
  if (e.target.tagName !== "path") return
  paint(e.target)
})

svg.addEventListener("mousemove", (e) => {
  if (!isMouseDown) return
  if (e.target.tagName !== "path") return
  paint(e.target)
})

</script>

</body>
</html>
